name: Promo Update
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install httpx requests
      - run: python scripts/update_promo.py
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
      - run: |
          git config user.name "daily-updater"
          git config user.email "daily-updater@users.noreply.github.com"
          git add promo.html
          git diff --quiet && git diff --staged --quiet || git commit -m "promo update $(date +%Y-%m-%dT%H:%M)"
          git push